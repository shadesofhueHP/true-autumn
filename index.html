<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Autumn</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#6d7280;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

@media (max-width:640px){
.logo{max-width:180px;}
.grid{gap:12px;}
.tile{border-radius:18px;}

.close-btn{
top:28px;
right:28px;
}

.controls{
top:28px;
right:76px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>True Autumn</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"TRUE AUTUMN NEUTRALS",
colors:[
"#F6EEDF",
"#F2E7CF",
"#DED2B8",
"#C6B89A",
"#A58C6A",
"#8B6C45"
]
},

{
title:"MUSHROOM + TAUPE",
colors:[
"#B5B09C",
"#9D9885",
"#857C68",
"#756754",
"#6D5A4A",
"#4F4740"
]
},

{
title:"CAMEL + COGNAC",
colors:[
"#C89A62",
"#B98B57",
"#A97A46",
"#996C3B",
"#87592A",
"#72481E"
]
},

{
title:"GOLDEN YELLOWS",
colors:[
"#DCC978",
"#D1B95B",
"#C39F35",
"#B88D1F",
"#98883F"
]
},

{
title:"OCHRE + BRONZE",
colors:[
"#C9A15A",
"#B88942",
"#A77432",
"#926327",
"#7E5524"
]
},

{
title:"RUST + TERRACOTTA",
colors:[
"#E2A465",
"#D98D57",
"#C96D4B",
"#B85A3C",
"#A34D33",
"#8E432E"
]
},

{
title:"PAPRIKA + BRICK",
colors:[
"#C65C49",
"#B14A3E",
"#9B3F3A",
"#8A463B",
"#7D3A3A"
]
},

{
title:"PEACH + SPICE",
colors:[
"#E5B297",
"#D89682",
"#D5826B",
"#D97E6D",
"#C56552"
]
},

{
title:"OLIVE + MOSS",
colors:[
"#B1AB63",
"#9E9A4C",
"#8B8A41",
"#7A7C39",
"#6B7339",
"#5C6733"
]
},

{
title:"SAGE + LODEN",
colors:[
"#A8B58A",
"#92A36F",
"#7E8E5F",
"#6C8150",
"#5C7447",
"#4E653D"
]
},

{
title:"FOREST GREENS",
colors:[
"#5E8A3D",
"#4F7B35",
"#47703B",
"#3E6337",
"#33573A",
"#28503A"
]
},

{
title:"TEAL + PETROL",
colors:[
"#4A9496",
"#3E8487",
"#2F7378",
"#26666B",
"#1F5A5F",
"#355C6B"
]
},

{
title:"AUBERGINE + PLUM",
colors:[
"#7D657E",
"#70586E",
"#644E61",
"#5D4354",
"#523847"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const lightboxColor=document.getElementById("lightboxColor");

let all=[];
let index=0;
let startX=0;

groups.forEach(group=>{

const title=document.createElement("div");
title.className="section-title";
title.textContent=group.title;
grid.appendChild(title);

group.colors.forEach(color=>{

all.push(color);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=color;

tile.onclick=()=>{
index=all.indexOf(color);
open();
};

grid.appendChild(tile);

});

});

function open(){
lightbox.classList.add("show");
render();
}

function render(){
lightboxColor.style.background=all[index];
}

function next(){
index=(index+1)%all.length;
render();
}

function prev(){
index=(index-1+all.length)%all.length;
render();
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
diff<0?next():prev();
});

</script>

</body>
</html>
